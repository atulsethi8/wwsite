<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - WanderW</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .contact-form {
            background: rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        input, textarea, select {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.9);
            color: #333;
            font-size: 1rem;
        }
        textarea {
            height: 120px;
            resize: vertical;
        }
        .submit-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 1rem 2rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .submit-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        .nav-link {
            color: white;
            text-decoration: none;
            margin-bottom: 2rem;
            display: inline-block;
        }
        .nav-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="nav-link">← Back to Home</a>
        
        <div class="header">
            <h1>🌍 Contact WanderW</h1>
            <p>Ready to start your journey? Get in touch with us!</p>
        </div>

        <form name="contact"
      id="ww-contact-form"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      action="/thank-you.html">
  <input type="hidden" name="form-name" value="contact" />
  <p class="hidden"><label>Don’t fill this out: <input name="bot-field" /></label></p>

  <input type="text"  name="name"    placeholder="Your full name" required />
  <input type="email" name="email"   placeholder="your@email.com" required />
  <input type="tel"   name="phone"   placeholder="+91 98XXXXXXXX" />
  <textarea name="message" rows="6" placeholder="Tell us about your dream trip…" required></textarea>

  <button type="submit">Send Message</button>
</form>

    </div>
</body>
</html>
