<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - WanderW</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .contact-form {
            background: rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        input, textarea, select {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.9);
            color: #333;
            font-size: 1rem;
        }
        textarea {
            height: 120px;
            resize: vertical;
        }
        .submit-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 1rem 2rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .submit-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        .nav-link {
            color: white;
            text-decoration: none;
            margin-bottom: 2rem;
            display: inline-block;
        }
        .nav-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="nav-link">← Back to Home</a>
        
        <div class="header">
            <h1>🌍 Contact WanderW</h1>
            <p>Ready to start your journey? Get in touch with us!</p>
        </div>

        <form name="contact"
      id="ww-contact-form"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      action="/thank-you.html">
  <input type="hidden" name="form-name" value="contact" />
  <p class="hidden"><label>Don’t fill this out: <input name="bot-field" /></label></p>

  <input type="text"  name="name"    placeholder="Your full name" required />
  <input type="email" name="email"   placeholder="your@email.com" required />
  <input type="tel"   name="phone"   placeholder="+91 98XXXXXXXX" />
  <textarea name="message" rows="6" placeholder="Tell us about your dream trip…" required></textarea>

  <button type="submit">Send Message</button>
</form>

    </div>
    <script>
  document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('ww-contact-form');
    if (!form) return;
    form.addEventListener('submit', () => {
      try {
        const data = {
          name:  form.querySelector('[name="name"]')?.value || '',
          email: form.querySelector('[name="email"]')?.value || '',
          phone: form.querySelector('[name="phone"]')?.value || '',
          page:  '/contact'
        };
        fetch('/.netlify/functions/auto-reply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        }).catch(()=>{});
      } catch(e) {}
    });
  });
</script>
<!-- Hidden Netlify form to register "contact" -->
<form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="text" name="name">
  <input type="email" name="email">
  <input type="tel" name="phone">
  <textarea name="message"></textarea>
</form>

<script>
(function () {
  // Find the visible form on the contact page
  var contactSection = document.querySelector('#contact');
  var visibleForm = contactSection ? contactSection.querySelector('form') : document.querySelector('form');
  if (!visibleForm) return;

  // Make sure fields have names Netlify expects
  function ensureName(sel, name){
    var el = visibleForm.querySelector(sel);
    if (el && !el.name) el.name = name;
  }
  ensureName('input[type="text"], input[name="name"]', 'name');
  ensureName('input[type="email"], input[name="email"]', 'email');
  ensureName('input[type="tel"], input[name="phone"]', 'phone');
  ensureName('textarea, textarea[name="message"]', 'message');

  function encode(d){return Object.keys(d).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(d[k]);}).join('&');}

  // Intercept submit → send to Netlify → go to thank-you
  visibleForm.addEventListener('submit', function (e) {
    e.preventDefault();
    var name    = (visibleForm.querySelector('[name="name"]')    || {}).value || '';
    var email   = (visibleForm.querySelector('[name="email"]')   || {}).value || '';
    var phone   = (visibleForm.querySelector('[name="phone"]')   || {}).value || '';
    var message = (visibleForm.querySelector('[name="message"]') || {}).value || '';

    fetch('/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: encode({ 'form-name':'contact', name:name, email:email, phone:phone, message:message, page: window.location.pathname })
    })
    .then(function(){
      // optional auto-reply
      fetch('/.netlify/functions/auto-reply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name:name, email:email, phone:phone, page:'/contact' })
      }).catch(function(){});
      window.location.href = '/thank-you.html';
    })
    .catch(function(){ window.location.href = '/thank-you.html'; });
  }, { passive:false });
})();
</script>

</body>
</html>
