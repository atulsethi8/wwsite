# Netlify config for Wander Wyze

[build]
  # Your static site files live in /public
  publish = "public"

[functions]
  # Tell Netlify where our serverless functions live
  directory = "netlify/functions"
  node_bundler = "esbuild"

# (Optional) Keep pretty URLs working if needed
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
