[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/explorer-club"
  to = "/explorer-club.html"
  status = 200

[[redirects]]
  from = "/vietnam-tour-packages"
  to = "/vietnam-tour-packages.html"
  status = 200

[[redirects]]
  from = "/dubai-combo-deals"
  to = "/dubai-combo-deals.html"
  status = 200

[[redirects]]
  from = "/kenya-safari-packages"
  to = "/kenya-safari-packages.html"
  status = 200

[[redirects]]
  from = "/maldives-paradise"
  to = "/maldives-paradise.html"
  status = 200

[[redirects]]
  from = "/bali-cultural-journey"
  to = "/bali-cultural-journey.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/#contact"
  status = 200
  force = true

[[redirects]]
  from = "/contact.html"
  to = "/#contact"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
